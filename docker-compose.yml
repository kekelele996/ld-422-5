name: research-lab

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: research_lab
      POSTGRES_USER: research_user
      POSTGRES_PASSWORD: research_password
    volumes:
      - research_lab_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research_user -d research_lab"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      JWT_SECRET: research-lab-local-secret
      DATABASE_URL: postgresql://research_user:research_password@postgres:5432/research_lab
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    environment:
      API_BASE_URL: http://backend:3000/api
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  research_lab_postgres:
